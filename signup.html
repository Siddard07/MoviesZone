<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<style>
    body{
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f5;
    }
    .container{
        background: white;
        height:250px;
        width:450px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap:15px;
        text-align: center;
        border: 1px solid black;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        padding:25px;
    }
    label{
        font-size: 20px;
        font-weight: bold;
    }
    #name{
        width:100%;
        height:40px;
        padding:0 10px;
        border:1px solid #ccc;
    }
    #button{
        width:100%;
        height:40px;
        border:none;
        background: #2563EB;
    }
    #button:hover{
        background: #1D4ED8;
        cursor:pointer;
    }

</style>
<body>
    <div class="container">
        <label for="name">Enter Your Name:</label>
        <input type="text" id="name">
        <button id="button">Submit</button>
    </div>
    
</body>
<script>
    const input=document.getElementById("name");
    const button=document.getElementById("button");
    button.addEventListener("click",()=>{
        const username=input.value.trim();
        if(username===''){
            alert("please enter your name");
            return;ZAZ
        }
        localStorage.setItem("username",username);
        window.location.href="movieszone.html"
    })
</script>
</html>
